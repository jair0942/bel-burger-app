<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEL BURGER — Premium Burger Experience</title>
    <meta name="description" content="BEL BURGER: Comida Rapida premium artesanales. Pide ahora por WhatsApp.">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <header class="navbar" id="navbar">
        <div class="nav-inner">
            <a href="#hero" class="nav-brand">
                <span class="brand-bel">BEL</span>
                <span class="brand-burger">BURGER</span>
            </a>
            <nav class="nav-links">
                <a href="#hero" class="nav-link">Inicio</a>
                <a href="#menu" class="nav-link">Menú</a>
            </nav>
            <button class="cart-btn" id="cart-toggle" aria-label="Abrir carrito">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1" />
                    <circle cx="20" cy="21" r="1" />
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
                </svg>
                <span class="cart-badge" id="cart-count">0</span>
            </button>
        </div>
    </header>

    <!-- Hero -->
    <section class="hero" id="hero">
        <div class="hero-bg-glow"></div>
        <div class="hero-bg-glow hero-bg-glow--2"></div>
        <div class="hero-body">
            <div class="hero-logo-area" id="hero-logo-area">
                <img src="logo.webp" alt="BEL BURGER" class="hero-logo" id="hero-logo">
            </div>
            <div class="hero-info">
                <div class="focus-container" id="true-focus-container"></div>
                <p class="hero-sub">Comida Rapida · Desde la parrilla a tu mesa</p>
                <a href="#menu" class="btn-primary hero-cta">
                    Ver Menú
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <path d="M6 18L18 6M18 6H8M18 6v10" />
                    </svg>
                </a>
            </div>
        </div>
        <div class="scroll-indicator">
            <div class="scroll-dot"></div>
        </div>
    </section>

    <!-- Menu -->
    <section class="menu" id="menu">
        <div class="menu-header">
            <span class="menu-label">— Menú —</span>
            <h2 class="menu-title">Nuestras <span class="text-accent">Creaciones</span></h2>
            <p class="menu-desc">Cada preparación es una obra maestra artesanal</p>
        </div>
        <div class="cards-grid" id="cards-grid">
            <!-- JS renders cards here -->
        </div>
    </section>

    <!-- Cart Sidebar -->
    <div class="cart-panel" id="cart-panel">
        <div class="cart-top">
            <h2 class="cart-heading">Tu Pedido</h2>
            <button class="cart-close" id="cart-close" aria-label="Cerrar">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M18 6L6 18M6 6l12 12" />
                </svg>
            </button>
        </div>
        <div class="cart-list" id="cart-list"></div>
        <div class="cart-bottom">
            <div class="cart-delivery-box">
                <h4 class="del-heading">Dirección de Entrega</h4>
                <div class="del-inputs">
                    <input type="text" id="del-barrio" placeholder="📍 Barrio" class="del-input">
                    <input type="text" id="del-dir" placeholder="🏠 Dirección (Ej. Calle 5 # 12-34)" class="del-input">
                    <input type="text" id="del-ref" placeholder="🗺️ Referencia de ubicación (Opcional)" class="del-input">
                </div>
                <button type="button" id="btn-gps" class="btn-gps">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <circle cx="12" cy="12" r="3" />
                        <path d="M12 2v2M12 20v2M2 12h2M20 12h2M12 4a8 8 0 1 0 0 16 8 8 0 0 0 0-16z"/>
                    </svg>
                    Usar mi ubicación GPS
                </button>
            </div>
            <div class="cart-delivery-box" style="margin-top: 15px;">
                <h4 class="del-heading">Método de Pago</h4>
                <select id="del-pago" class="del-input" style="background: rgba(255, 255, 255, 0.05); color: #fff;">
                    <option value="" disabled selected>💳 Selecciona un método</option>
                    <option value="Efectivo" style="color: #000;">💵 Efectivo</option>
                    <option value="Transferencia" style="color: #000;">🏦 Transferencia</option>
                </select>
            </div>
            <div class="cart-total-row">
                <span>Total</span>
                <span class="cart-total-val" id="cart-total-price">$0</span>
            </div>
            <button class="btn-whatsapp" id="checkout-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" />
                    <path
                        d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.832-1.438A9.955 9.955 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z" />
                </svg>
                Pedir por WhatsApp
            </button>
        </div>
    </div>
    <div class="cart-overlay" id="cart-overlay"></div>

    <!-- Product Modal -->
    <div class="product-modal-window" id="product-modal-window">
        <div class="pm-content">
            <button class="pm-close" id="pm-close" aria-label="Cerrar modal">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M18 6L6 18M6 6l12 12" />
                </svg>
            </button>
            <div class="pm-img-box">
                <img src="" alt="" id="pm-img">
                <span class="pm-tag" id="pm-tag"></span>
            </div>
            <div class="pm-body">
                <h2 class="pm-name" id="pm-name"></h2>
                <p class="pm-desc" id="pm-desc"></p>
                <div class="pm-price" id="pm-price"></div>
                
                <div class="pm-modifications">
                    <label for="pm-notes">Modificaciones o extras (Opcional)</label>
                    <textarea id="pm-notes" rows="2" placeholder="Ej. Sin cebolla, salsa aparte..."></textarea>
                </div>

                <div class="pm-controls">
                    <div class="qty-box pm-qty-box">
                        <button class="qty-btn" id="pm-minus" type="button">−</button>
                        <span class="qty-num" id="pm-num">1</span>
                        <button class="qty-btn" id="pm-plus" type="button">+</button>
                    </div>
                    <button class="add-btn pm-add-btn" id="pm-add" type="button">Agregar al pedido</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <span class="brand-bel">BEL</span><span class="brand-burger">BURGER</span>
        <p class="footer-text">© 2026 BEL BURGER · Premium Experience</p>
    </footer>

    <script src="app.js"></script>
</body>

</html>
